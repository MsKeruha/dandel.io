version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dandel_db
    restart: always
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ot.postgre}
      POSTGRES_DB: ${DB_NAME:-dandelion}
    ports:
      - "5432:5432"
    volumes:
      - dandel_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dandelion}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: dandel_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "until python -c 'import socket, os; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.settimeout(1); s.connect((os.getenv(\"DB_HOST\", \"db\"), int(os.getenv(\"DB_PORT\", 5432))))' 2>/dev/null; do echo 'Waiting for database...'; sleep 1; done && 
      echo 'Database is ready!' && 
      alembic upgrade head && 
      python seed.py && 
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  redis:
    image: redis:7-alpine
    container_name: dandel_redis
    restart: always
    ports:
      - "6379:6379"

  celery_worker:
    build: ./backend
    container_name: dandel_celery_worker
    restart: always
    command: celery -A celery_app.celery worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - C_FORCE_ROOT=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_beat:
    build: ./backend
    container_name: dandel_celery_beat
    restart: always
    command: celery -A celery_app.celery beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - C_FORCE_ROOT=true
    depends_on:
      - celery_worker

  frontend:
    build: ./frontend
    container_name: dandel_frontend
    restart: always
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_TARGET=http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"  # Mapping host port 5173 to container's Nginx port 80

volumes:
  dandel_db_data:

